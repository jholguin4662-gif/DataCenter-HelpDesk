<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportar Incidente</title>

    <link rel="stylesheet" href="css/ui-kit.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <h1>Data Center HelpDesk</h1>
    <p>Registro de nuevos incidentes</p>
</header>


<nav>
    <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="reportar.html">Reportar Incidente</a></li>
        <li><a href="tickets.html">Tickets</a></li>
    </ul>
</nav>


<main>

<section>

    <h2>Formulario de reporte</h2>


    <form class="form-container">

        <article class="card">

            <label for="titulo">
                Título del incidente:
            </label>
            <br>

            <input
                class="form-control"
                type="text"
                id="titulo"
                name="titulo"
                placeholder="Ingrese el título del problema"
            >

        </article>


        <article class="card">

            <label for="categoria">
                Categoría:
            </label>
            <br>

            <select
                class="form-control"
                id="categoria"
                name="categoria">

                <option value="red">
                    Red
                </option>

                <option value="hardware">
                    Hardware
                </option>

                <option value="software">
                    Software
                </option>

            </select>

        </article>


        <article class="card">

            <p>Nivel de prioridad:</p>

            <input 
                type="radio" 
                id="alta" 
                name="prioridad"
                value="alta"
            >
            <label for="alta">
                Alta
            </label>


            <input 
                type="radio" 
                id="media" 
                name="prioridad"
                value="media"
            >
            <label for="media">
                Media
            </label>


            <input 
                type="radio" 
                id="baja" 
                name="prioridad"
                value="baja"
            >
            <label for="baja">
                Baja
            </label>

        </article>


        <article class="card">

            <label for="descripcion">
                Descripción detallada:
            </label>
            <br>

            <textarea
                class="form-control"
                id="descripcion"
                name="descripcion"
                rows="6"
                placeholder="Describa el incidente..."
            ></textarea>

        </article>


        <button class="btn btn-primary">
            Enviar reporte
        </button>


    </form> 

</section>

</main>


<footer>

<p>
    © 2026 DataCenter HelpDesk | Soporte técnico
</p>

</footer>


</body>
</html>
