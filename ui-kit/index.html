<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataCenter HelpDesk - UI Kit</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>DataCenter HelpDesk</h1>
    <p>Librería de componentes UI - Design System</p>
</header>


<main>

    <section>
        <h2>Botones</h2>

        <button class="btn btn-primary">
            Botón Primario
        </button>

        <button class="btn btn-secondary">
            Botón Secundario
        </button>

        <button class="btn btn-danger">
            Botón Peligro
        </button>

    </section>

    <section>

        <h2>Componentes de formulario</h2>

        <form>

            <label for="incidente">
                Título del incidente
            </label>

            <input 
                type="text" 
                id="incidente"
                placeholder="Ingrese el título"
            >


            <label for="categoria">
                Categoría
            </label>

            <select id="categoria">

                <option>
                    Red
                </option>

                <option>
                    Hardware
                </option>

                <option>
                    Software
                </option>

            </select>


        </form>

    </section>

    <section>

        <h2>Tarjeta de ticket</h2>


        <article>

            <h3>
                Fallo de conexión en servidor
            </h3>

            <p>
                Categoría: Red
            </p>

            <p>
                El servidor presenta problemas de comunicación.
            </p>

        </article>

        
    </section>

    <section>

        <h2>Estados de prioridad</h2>

        <span class="badge badge-high">
            Alta
        </span>

        <span class="badge badge-medium">
            Media
        </span>

        <span class="badge badge-low">
            Baja
        </span>
    

    </section>

</main>

<footer>

<p>
    © 2026 DataCenter HelpDesk
</p>

</footer>


</body>

</html>
